name: CI Build Verification

on:
  push:
    branches: [ main, 3.1-maint, 3.2-dev ]
  pull_request:
    branches: [ main, 3.1-maint, 3.2-dev ]

jobs:
  build-sender:
    name: Build Sender (macOS 15 - Apple Silicon)
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install Tools
        run: |
          brew install xcodegen

      - name: Build Sender App
        run: |
          cd TargetBridge-Sender
          ./scripts/build_targetbridge_sender_app.sh

      - name: Run Sender Unit Tests
        run: |
          cd TargetBridge-Sender
          xcodebuild test -project TargetBridge.xcodeproj -scheme TBDisplaySender -destination 'platform=macOS' -derivedDataPath .build/DerivedData

  build-receiver:
    name: Build Receiver (${{ matrix.os }} - ${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            arch: x86_64
          - os: macos-15
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          brew install ffmpeg sdl2 dylibbundler

      - name: Run Receiver Parser Tests
        run: |
          cd TargetBridge-Receiver/TBReceiverC
          make test

      - name: Build Receiver App
        run: |
          cd TargetBridge-Receiver
          ./scripts/build_tbreceiver_c_app.sh
